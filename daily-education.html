<style>
  :root {
    --bg: #0f1724;
    --bg2: #141e2e;
    --bg3: #1a2540;
    --gold: #3b82f6;
    --gold-dim: rgba(59,130,246,0.15);
    --gold-border: rgba(59,130,246,0.3);
    --text: #e8eaf0;
    --text-dim: #8899aa;
    --accent: #f0c040;
    --accent-dim: rgba(240,192,64,0.12);
    --green: #22c55e;
    --red: #ef4444;
    --border: rgba(255,255,255,0.06);
    --radius: 12px;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-body: 'PT Serif', Georgia, serif;

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    line-height: 1.7;
    min-height: 100vh;

  /* ── NAV (same style as site) ── */
  nav {
    background: rgba(15,23,36,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-logo {
    font-family: var(--font-display);
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text);
    text-decoration: none;
    letter-spacing: 0.03em;
  }
  .nav-logo span { color: var(--gold); }
  .nav-links { display: flex; gap: 24px; }
  .nav-links a {
    color: var(--text-dim);
    text-decoration: none;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--gold); }

  /* ── HERO ── */
  .hero {
    border-bottom: 1px solid var(--border);
    padding: 64px 24px 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(59,130,246,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--gold-dim);
    border: 1px solid var(--gold-border);
    color: var(--gold);
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 20px;
  }

  .hero h1 {
    font-family: var(--font-display);
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    margin-bottom: 16px;
    line-height: 1.2;
  }
  .hero h1 em { color: var(--gold); font-style: italic; }
  .hero p {
    color: var(--text-dim);
    font-size: 1rem;
    max-width: 520px;
    margin: 0 auto;
    font-family: var(--font-body);
  }

  /* ── MAIN LAYOUT ── */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ── TODAY FEATURED ── */

  .section-label {

    letter-spacing: 0.14em;

  .section-label::after {

  .today-card {

  .today-card::before {

    top: 20px; right: 20px;
    background: var(--gold-dim);
    color: var(--gold);
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.1em;

<script>
// ─────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────
const WORKER_URL = 'https://xenos-ai-proxy.xenosfinance.workers.dev';
const GITHUB_RAW = 'https://raw.githubusercontent.com/xenosfinance-prog/waves/main';
const ADMIN_PASSWORD = 'RMG@Manu78';

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let allPosts = [];
let visibleCount = 9;
let activeFilter = 'all';
let isAdmin = false;
let selectedPostDate = null;

// ── LibreTranslate integration (routed via Cloudflare Worker) ────────────
const WORKER_URL_EDU = 'https://xenos-ai-proxy.xenosfinance.workers.dev';
const _ltCacheEdu = {};

async function ltTranslateEdu(text, target) {
  if (!text || !target || target === 'en') return text;
  const key = target + '|' + text.slice(0, 60);
  if (_ltCacheEdu[key]) return _ltCacheEdu[key];
  try {
    const controller = new AbortController();
    const tid = setTimeout(() => controller.abort(), 8000);
    const r = await fetch(WORKER_URL_EDU, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({type: 'translate', q: text, source: 'en', target: target, format: 'text'}),
      signal: controller.signal
    });
    clearTimeout(tid);
    if (!r.ok) return text;
    const d = await r.json();
    const t = d.translatedText || text;
    _ltCacheEdu[key] = t;
    return t;
  } catch(e) { return text; } // graceful fallback: return original on error/timeout
}

function getCurrentLangEdu() {
  return localStorage.getItem('xenos_lang') || 'en';
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
async function init() {
  await loadIndex();
}

async function loadIndex() {
  try {
    const ts = Date.now();
    const res = await fetch(`${GITHUB_RAW}/daily_education/index.json?t=${ts}`);
    if (!res.ok) throw new Error('index not found');
    const data = await res.json();
    allPosts = data.posts || [];
    renderToday();
    renderArchive();
  } catch (e) {
    // No posts yet
    renderTodayEmpty();
    renderArchiveEmpty();
  }
}

// ─────────────────────────────────────────────
// TODAY CARD
// ─────────────────────────────────────────────
async function renderToday() {
  if (!allPosts.length) { renderTodayEmpty(); return; }

  const latest = allPosts[0];
  try {
    const res = await fetch(`${GITHUB_RAW}/${latest.file}?t=${Date.now()}`);
    if (!res.ok) throw new Error();
    const data = await res.json();

    const dateEl = document.createElement('div');
    dateEl.className = 'today-date';
    dateEl.textContent = formatDateFull(latest.date);

    const lang = getCurrentLangEdu();
    const translatedContent = lang !== 'en' ? await ltTranslateEdu(data.content || '', lang) : (data.content || '');

    const contentEl = document.createElement('div');
    contentEl.className = 'today-content';
    contentEl.innerHTML = formatEduContent(translatedContent);

    const card = document.getElementById('todayCard');
    card.innerHTML = '';
    card.appendChild(dateEl);
    card.appendChild(contentEl);

  } catch(e) {
    renderTodayEmpty();
  }
}

function renderTodayEmpty() {
  const card = document.getElementById('todayCard');
  card.innerHTML = `
    <div class="no-posts">
      <div class="icon">📚</div>
      <div><span data-i18n="label_no_content">No content published yet.</span></div>
      <div style="margin-top:8px;font-size:0.75rem;"><span data-i18n="label_edu_auto_msg">Daily education posts will appear here automatically.</span></div>
    </div>`;
}

// ─────────────────────────────────────────────
// ARCHIVE
// ─────────────────────────────────────────────
function renderArchive() {
  const grid = document.getElementById('archiveGrid');
  grid.innerHTML = '';

  // Skip today (index 0) in archive
  let posts = allPosts.slice(1);

  if (activeFilter !== 'all') {
    posts = posts.filter(p => p.day_name.toLowerCase() === activeFilter);
  }

  if (!posts.length) {
    grid.innerHTML = `<div class="no-posts" style="grid-column:1/-1">
      <div class="icon">📂</div>
      <div><span data-i18n="label_no_archive">No archived posts yet.</span></div>
    </div>`;
    document.getElementById('loadMoreWrap').style.display = 'none';
    return;
  }

  const toShow = posts.slice(0, visibleCount);
  toShow.forEach(p => {
    const card = document.createElement('div');
    card.className = 'archive-card';
    card.onclick = () => openModal(p);
    card.innerHTML = `
      <div class="archive-card-date">${formatDateShort(p.date)}</div>
      <div class="archive-card-day">${p.day_name}</div>
      <div class="archive-card-preview" id="preview-${p.date}"><span data-i18n="label_loading">Loading...</span></div>
      <div class="archive-card-arrow">→</div>`;
    grid.appendChild(card);
    loadPreview(p);
  });

  const loadMoreWrap = document.getElementById('loadMoreWrap');
  if (posts.length > visibleCount) {
    loadMoreWrap.style.display = 'block';
    document.getElementById('loadMoreBtn').disabled = false;
  } else {
    loadMoreWrap.style.display = 'none';
  }
}

async function loadPreview(post) {
  try {
    const res = await fetch(`${GITHUB_RAW}/${post.file}?t=${Date.now()}`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    const el = document.getElementById(`preview-${post.date}`);
    if (el) {
      let text = data.content
        .replace(/━+/g, '')
        .replace(/\n{3,}/g, '\n')
        .trim()
        .substring(0, 180);
      const lang = getCurrentLangEdu();
      if (lang !== 'en') text = await ltTranslateEdu(text, lang);
      el.textContent = text + '...';
    }
  } catch(e) {
    const el = document.getElementById(`preview-${post.date}`);
    if (el) el.textContent = 'Educational content for ' + post.day_name;
  }
}

function renderArchiveEmpty() {
  document.getElementById('archiveGrid').innerHTML = `
    <div class="no-posts" style="grid-column:1/-1">
      <div class="icon">📂</div>
      <div>${typeof window.t === 'function' ? window.t('label_archive_empty') : 'Archive is empty.'}</div>
    </div>`;
}

function loadMore() {
  visibleCount += 9;
  renderArchive();
}

function setFilter(day, btn) {
  activeFilter = day;
  visibleCount = 9;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderArchive();
}

// ─────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────
async function openModal(post) {
  selectedPostDate = post.date;
  document.getElementById('modalDate').textContent = formatDateFull(post.date) + ' — ' + post.day_name;
  document.getElementById('modalContent').textContent = 'Loading...';
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  try {
    const res = await fetch(`${GITHUB_RAW}/${post.file}?t=${Date.now()}`);
    const data = await res.json();
    document.getElementById('modalContent').innerHTML = formatEduContent(data.content);
  } catch(e) {
    document.getElementById('modalContent').textContent = 'Error loading content.';
  }
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  selectedPostDate = null;
}

// ─────────────────────────────────────────────
// ADMIN
// ─────────────────────────────────────────────
function toggleAdminPanel() {
  document.getElementById('adminPanel').classList.toggle('open');
}

function adminLogin() {
  const pwd = document.getElementById('adminPwd').value;
  if (pwd === ADMIN_PASSWORD) {
    isAdmin = true;
    document.getElementById('adminActions').style.display = 'block';
    setAdminStatus('Logged in ✓', 'ok');
    document.getElementById('adminPwd').style.display = 'none';
    document.querySelector('#adminPanel .admin-btn').style.display = 'none';
  } else {
    setAdminStatus('Wrong password', 'err');
  }
}

async function adminDelete() {
  if (!isAdmin) return;
  const date = selectedPostDate || allPosts[0]?.date;
  if (!date) { setAdminStatus('No post selected', 'err'); return; }

  if (!confirm(`Delete post for ${date}?`)) return;

  setAdminStatus('Deleting...', '');
  try {
    const res = await fetch(`${WORKER_URL}/delete-education`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date, password: ADMIN_PASSWORD })
    });
    const data = await res.json();
    if (data.success) {
      setAdminStatus('Deleted ✓', 'ok');
      closeModalDirect();
      await loadIndex();
    } else {
      setAdminStatus(data.error || 'Error', 'err');
    }
  } catch(e) {
    setAdminStatus('Network error', 'err');
  }
}

function refreshPage() { window.location.reload(); }

function setAdminStatus(msg, cls) {
  const el = document.getElementById('adminStatus');
  el.textContent = msg;
  el.className = 'admin-status ' + cls;
}

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
function formatDateFull(dateStr) {
  const d = new Date(dateStr + 'T12:00:00Z');
  return d.toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}
function formatDateShort(dateStr) {
  const d = new Date(dateStr + 'T12:00:00Z');
  return d.toLocaleDateString('en-GB', { year: 'numeric', month: 'short', day: 'numeric' });
}

// Keyboard close modal
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

// ─────────────────────────────────────────────
// CONTENT FORMATTER — strips Telegram markdown, renders rich HTML
// ─────────────────────────────────────────────
function formatEduContent(raw) {
  if (!raw) return '';

  // Split into lines
  const lines = raw.split('\n');
  let html = '';
  let inList = false;
  let inSection = false;

  const closeList = () => { if (inList) { html += '</ul>'; inList = false; } };
  const closeSection = () => { if (inSection) { html += '</div>'; inSection = false; } };

  // Bold: *text* → <b>text</b>
  const parseBold = (text) => text.replace(/\*([^*]+)\*/g, '<b>$1</b>');

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i].trim();

    // Skip separator lines (━━━ etc)
    if (/^[━─═\-]{3,}$/.test(line)) {
      closeList();
      if (inSection) html += '<hr class="edu-separator">';
      continue;
    }

    // Main header (DAILY MARKET EDUCATION)
    if (/^📚\s*DAILY MARKET EDUCATION/i.test(line)) {
      closeList(); closeSection();
      continue; // already shown in today-date area
    }

    // Footer
    if (/educational purpose only/i.test(line)) {
      closeList(); closeSection();
      html += '<div class="edu-footer">⚠️ Educational purpose only</div>';
      continue;
    }

    // Empty line
    if (!line) {
      closeList();
      continue;
    }

    // PRO TIP / SMART MONEY RULE — special callout
    if (/^(PRO TIP|💡\s*PRO TIP)/i.test(line)) {
      closeList();
      const rest = line.replace(/^(💡\s*)?(PRO TIP)\s*[:\-]?\s*/i, '');
      // grab next non-empty lines until next section
      let tipText = rest;
      while (i + 1 < lines.length && lines[i+1].trim() && !/^[📊📈🧠⚠️💡🔑]/.test(lines[i+1].trim()) && !/^(SMART MONEY|PRO TIP|━)/i.test(lines[i+1].trim())) {
        i++;
        tipText += ' ' + lines[i].trim();
      }
      html += `<div class="edu-pro-tip">💡 <b><span data-i18n="label_pro_tip">PRO TIP</span></b> — ${parseBold(tipText)}</div>`;
      continue;
    }

    if (/^(SMART MONEY RULE|🔑\s*SMART MONEY)/i.test(line)) {
      closeList();
      const rest = line.replace(/^(🔑\s*)?(SMART MONEY RULE)\s*[:\-]?\s*/i, '');
      let tipText = rest;
      while (i + 1 < lines.length && lines[i+1].trim() && !/^[📊📈🧠⚠️💡🔑]/.test(lines[i+1].trim())) {
        i++;
        tipText += ' ' + lines[i].trim();
      }
      html += `<div class="edu-smart-rule">🔑 <b><span data-i18n="label_smart_money">SMART MONEY RULE</span></b> — ${parseBold(tipText)}</div>`;
      continue;
    }

    // Section title — lines in ALL CAPS with emoji or starting with emoji + words
    const isSectionTitle = /^[📊📈📉🧠⚠️💰🔥⚡🎯📋🔍💡📌🏦🌍]/.test(line) ||
                           (/^[A-Z][A-Z\s&:]+$/.test(line) && line.length > 5 && line.length < 80);

    if (isSectionTitle) {
      closeList(); closeSection();
      inSection = true;
      html += `<div class="edu-section"><div class="edu-section-title">${line}</div>`;
      continue;
    }

    // Bullet / list item — starts with - or •
    if (/^[-•]\s+/.test(line)) {
      if (!inList) { html += '<ul class="edu-list">'; inList = true; }
      const itemText = parseBold(line.replace(/^[-•]\s+/, ''));
      html += `<li>${itemText}</li>`;
      continue;
    }

    // Regular paragraph
    closeList();
    if (!inSection) { inSection = true; html += '<div class="edu-section">'; }
    html += `<p class="edu-paragraph">${parseBold(line)}</p>`;
  }

  closeList();
  closeSection();
  return html;
}

// Start
init();
</script>
