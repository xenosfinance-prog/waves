<!DOCTYPE html> 
<html lang="it"> 
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XENOS · Signal Engine OMNI-COMPLETE</title>
<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap');

    :root {
        --bg: #080c10; --bg2: #0d1117; --bg3: #111820; --border: #1e2a38;
        --accent: #3b82f6; --red: #ef4444; --green: #10b981; --gold: #f59e0b;
        --text: #94a3b8; --text-bright: #f1f5f9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; min-height: 100vh; }

    /* AUTH & LAYOUT */
    #auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .auth-box { border: 1px solid var(--accent); background: var(--bg2); padding: 40px; width: 400px; box-shadow: 0 0 30px rgba(59,130,246,0.1); }
    #app { display: none; padding-bottom: 50px; }
    .wrap { max-width: 1400px; margin: 0 auto; padding: 0 20px; }

    header { border-bottom: 1px solid var(--border); padding: 20px 0; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-family: 'Inter', sans-serif; font-weight: 800; color: #fff; font-size: 20px; }
    .logo span { color: var(--accent); }

    /* CONTROLS */
    .controls { display: flex; gap: 15px; padding: 25px 0; border-bottom: 1px solid var(--border); }
    .btn { padding: 12px 24px; background: var(--accent); color: #000; border: none; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 11px; }
    .toggle-btn { padding: 8px 16px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; font-size: 10px; }
    .toggle-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(59,130,246,0.1); }

    /* SIGNAL SYSTEM */
    .signal-card { background: var(--bg2); border: 1px solid var(--border); margin-top: 15px; }
    .signal-header { display: grid; grid-template-columns: 120px 80px 180px 100px 100px 100px 80px 1fr; padding: 20px; cursor: pointer; align-items: center; }
    .sig-buy { color: var(--green); font-weight: bold; }
    .sig-sell { color: var(--red); font-weight: bold; }

    /* DETAIL VIEW - FULL PHYSICS & ELLIOTT */
    .detail-view { display: none; padding: 25px; border-top: 1px solid var(--border); background: #090d12; }
    .detail-view.open { display: block; }
    .main-grid { display: grid; grid-template-columns: 1fr 400px; gap: 25px; }
    
    .chart-box { position: relative; width: 100%; height: 550px; background: #000; border: 1px solid var(--border); }
    .price-layer { position: absolute; inset: 0; z-index: 1; }
    .pattern-layer { position: absolute; inset: 0; z-index: 2; pointer-events: none; }

    .sidebar { background: var(--bg3); padding: 25px; border: 1px solid var(--border); font-size: 11px; }
    .side-section { margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
    .side-title { color: var(--accent); font-size: 9px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: block; }
    
    .physics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
    .val-box { background: rgba(0,0,0,0.3); padding: 10px; border: 1px solid var(--border); }
    .val-box span { display: block; font-size: 8px; color: var(--text); }
    .val-box strong { color: var(--gold); font-size: 13px; }

    .btn-tg { background: #0088cc; color: #fff; width: 100%; margin-top: 15px; padding: 15px; }

    #toast { position: fixed; bottom: 20px; right: 20px; background: var(--green); color: #000; padding: 15px 30px; font-weight: 700; display: none; z-index: 9999; }
</style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <h2 style="color:#fff; margin-bottom:20px;">XENOS ENGINE ACCESS</h2>
        <input type="password" id="access-pwd" placeholder="PASSWORD" style="width:100%; padding:12px; background:var(--bg3); border:1px solid var(--border); color:#fff; margin-bottom:15px;">
        <button class="btn" style="width:100%" onclick="checkAuth()">INITIALIZE SYSTEM</button>
    </div>
</div>

<div id="app">
    <div class="wrap">
        <header>
            <div class="logo">XENOS<span>FINANCE</span></div>
            <div id="clock" style="color:var(--accent); font-size:12px;">--:--:-- UTC</div>
        </header>

        <div class="controls">
            <button class="toggle-btn active">M15</button>
            <button class="toggle-btn">H1</button>
            <button class="btn" style="margin-left:auto" onclick="generateXenosSignals()">SCAN FOR PATTERNS</button>
        </div>

        <div id="signals-list"></div>
    </div>
</div>

<div id="toast">SIGNAL BROADCASTED TO TELEGRAM</div>

<script>
const BOT_TOKEN = 'IL_TUO_TOKEN'; 
const CHAT_ID = 'IL_TUO_ID';

const XENOS_PATTERNS = {
    'Head & Shoulders': { desc: 'Reversal structure marking the end of a trend.', bias: 'SELL', target: 'Neckline breakout' },
    'Fibonacci Bounce': { desc: 'Bullish rejection at golden ratio level.', bias: 'BUY', target: '0.618 Extension' },
    'Double Top': { desc: 'Bearish reversal at major resistance.', bias: 'SELL', target: 'Support retest' },
    'Breakout Key Level': { desc: 'Momentum expansion beyond historical level.', bias: 'BUY', target: 'Liquidity sweep' }
};

function checkAuth() {
    if(document.getElementById('access-pwd').value === 'xenosfinance2026') {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        setInterval(() => { document.getElementById('clock').textContent = new Date().toISOString().substr(11,8) + " UTC"; }, 1000);
    }
}

function generateXenosSignals() {
    const list = document.getElementById('signals-list');
    list.innerHTML = '';
    ['EURUSD', 'CHFJPY', 'BTCUSD', 'GOLD'].forEach(pair => {
        const keys = Object.keys(XENOS_PATTERNS);
        const pName = keys[Math.floor(Math.random() * keys.length)];
        renderSignalCard(pair, pName);
    });
}

function renderSignalCard(pair, pName) {
    const id = "x_" + Math.random().toString(36).substr(2,9);
    const p = XENOS_PATTERNS[pName];
    const entry = (1.0500 + Math.random() * 200).toFixed(4);
    
    const card = document.createElement('div');
    card.className = 'signal-card';
    card.innerHTML = `
        <div class="signal-header" onclick="toggleXenos('${id}')">
            <div style="color:#fff; font-weight:800;">${pair}</div>
            <div class="${p.bias === 'BUY' ? 'sig-buy' : 'sig-sell'}">${p.bias}</div>
            <div style="color:var(--accent)">${pName}</div>
            <div>${entry}</div>
            <div style="color:var(--red)">${(entry*0.99).toFixed(4)}</div>
            <div style="color:var(--green)">${(entry*1.02).toFixed(4)}</div>
            <div style="color:var(--gold)">88%</div>
            <div style="text-align:right">1:2.5</div>
        </div>
        <div id="${id}" class="detail-view">
            <div class="main-grid">
                <div class="chart-box" id="cont_${id}">
                    <div id="price_${id}" class="price-layer"></div>
                    <canvas id="canvas_${id}" class="pattern-layer"></canvas>
                </div>
                <div class="sidebar">
                    <div class="side-section">
                        <span class="side-title">Elliott Wave Context</span>
                        <p>Potential completion of wave cycle. Structural alignment suggests high probability ${p.bias} move.</p>
                    </div>
                    <div class="side-section">
                        <span class="side-title">Pattern Description</span>
                        <p>${p.desc} Target identified at ${p.target}.</p>
                    </div>
                    <div class="side-section">
                        <span class="side-title">CFD Physics Validation</span>
                        <div class="physics-grid">
                            <div class="val-box"><span>REYNOLDS</span><strong>0.2831</strong></div>
                            <div class="val-box"><span>VISCOSITY</span><strong>0.0124</strong></div>
                        </div>
                    </div>
                    <button class="btn btn-tg" onclick="sendTelegramFull('${pair}','${p.bias}','${pName}','${entry}')">SEND TO TELEGRAM</button>
                </div>
            </div>
        </div>
    `;
    document.getElementById('signals-list').appendChild(card);
    setTimeout(() => initXenosEngine(id, pName, p.bias), 100);
}

function initXenosEngine(id, pName, bias) {
    const cont = document.getElementById(`cont_${id}`);
    const w = cont.clientWidth; const h = 550;
    
    const chart = LightweightCharts.createChart(document.getElementById(`price_${id}`), {
        layout: { background: { color: 'transparent' }, textColor: '#64748b' },
        grid: { vertLines: { visible: false }, horzLines: { color: '#1e2a38' } },
        width: w, height: h
    });
    const s = chart.addCandlestickSeries({ upColor: '#10b981', downColor: '#ef4444' });
    let d = []; let v = 100;
    for(let i=0; i<60; i++) { v += (Math.random()-0.5); d.push({time: i, open:v, high:v+0.3, low:v-0.3, close:v+0.1}); }
    s.setData(d);

    const canvas = document.getElementById(`canvas_${id}`);
    canvas.width = w; canvas.height = h;
    drawXenosPattern(canvas.getContext('2d'), w, h, pName, bias);
}

function drawXenosPattern(ctx, w, h, name, bias) {
    const color = bias === 'BUY' ? '#10b981' : '#ef4444';
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 2.5; ctx.shadowBlur = 10; ctx.shadowColor = "rgba(0,0,0,0.5)";
    
    if(name === 'Fibonacci Bounce') {
        [0.382, 0.5, 0.618].forEach(lvl => {
            ctx.setLineDash([5,5]); ctx.strokeStyle = "rgba(255,255,255,0.2)";
            ctx.beginPath(); ctx.moveTo(0, h*lvl); ctx.lineTo(w, h*lvl); ctx.stroke();
            ctx.fillStyle = "#fff"; ctx.fillText("FIBO " + lvl, 10, h*lvl - 5);
        });
        ctx.setLineDash([]); ctx.strokeStyle = color;
        ctx.beginPath(); ctx.moveTo(w*0.1, h*0.2); ctx.lineTo(w*0.4, h*0.618); ctx.lineTo(w*0.7, h*0.3); ctx.stroke();
    } else if (name === 'Head & Shoulders') {
        const neck = h*0.7;
        const pts = [{x:w*0.1, y:neck}, {x:w*0.25, y:h*0.4}, {x:w*0.4, y:neck}, {x:w*0.5, y:h*0.2}, {x:w*0.6, y:neck}, {x:w*0.75, y:h*0.4}, {x:w*0.9, y:neck}];
        ctx.beginPath(); pts.forEach((p,i) => i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y)); ctx.stroke();
        ctx.setLineDash([5,5]); ctx.strokeStyle = "#3b82f6"; ctx.beginPath(); ctx.moveTo(w*0.3, neck); ctx.lineTo(w*0.7, neck); ctx.stroke();
    } else {
        ctx.beginPath(); ctx.moveTo(w*0.2, h*0.8); ctx.lineTo(w*0.5, h*0.2); ctx.lineTo(w*0.8, h*0.5); ctx.stroke();
    }

    // FRECCIA DINAMICA: PUNTA SEMPRE VERSO L'ALTO MA CAMBIA COLORE
    const startX = w*0.85; const startY = h*0.5;
    const endY = startY - 60; // Sempre verso l'alto come richiesto
    drawXenosArrow(ctx, startX, startY, startX + 30, endY, color);
}

function drawXenosArrow(ctx, x1, y1, x2, y2, color) {
    const head = 12; const angle = Math.atan2(y2-y1, x2-x1);
    ctx.setLineDash([]); ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x2,y2);
    ctx.lineTo(x2-head*Math.cos(angle-Math.PI/6), y2-head*Math.sin(angle-Math.PI/6));
    ctx.lineTo(x2-head*Math.cos(angle+Math.PI/6), y2-head*Math.sin(angle+Math.PI/6));
    ctx.fill();
}

async function sendTelegramFull(pair, dir, pattern, entry) {
    const chartUrl = `https://s3.tradingview.com/snapshots/${pair.toLowerCase().replace('usd','')}/xenos.png`;
    const msg = ` *${pair} — ${dir}*\n` +
                ` Pattern: ${pattern}\n` +
                ` Entry: ${entry}\n` +
                ` SL: ${(entry*0.99).toFixed(4)}\n` +
                ` TP: ${(entry*1.02).toFixed(4)}\n\n` +
                ` *Elliott Wave*: Confirmed Cycle\n` +
                ` *CFD Physics*: Reynolds 0.2831\n\n` +
                `[LIVE CHART RECAP](${chartUrl})`;

    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: CHAT_ID, text: msg, parse_mode: 'Markdown' })
    });
    const t = document.getElementById('toast');
    t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000);
}

function toggleXenos(id) { document.getElementById(id).classList.toggle('open'); }
</script>
</body>
</html>
