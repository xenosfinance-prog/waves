<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XENOS · Signal Engine</title>
<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

    :root {
        --bg: #080c10; --bg2: #0d1117; --bg3: #111820; --border: #1e2a38;
        --gold: #f59e0b; --accent: #3b82f6; --text: #94a3b8;
        --red: #ef4444; --green: #10b981; --text-bright: #f1f5f9;
        --mono: 'IBM Plex Mono', monospace; --sans: 'Inter', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; }

    /* UI STRUCTURE */
    .wrap { max-width: 1400px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }
    header { border-bottom: 1px solid var(--border); padding: 16px 0; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-family: var(--sans); font-weight: 800; font-size: 18px; color: var(--text-bright); }
    .logo span { color: var(--accent); }

    /* AUTH SCREEN */
    #auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .auth-box { border: 1px solid var(--border); background: var(--bg2); padding: 40px; width: 380px; text-align: center; }
    .field input { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: #fff; padding: 10px; margin: 10px 0; outline: none; }
    .btn { width: 100%; padding: 12px; background: var(--accent); color: #000; border: none; font-weight: 700; cursor: pointer; }

    /* APP LAYOUT */
    #app { display: none; }
    .controls { display: flex; gap: 15px; padding: 20px 0; border-bottom: 1px solid var(--border); align-items: flex-end; flex-wrap: wrap; }
    .toggle-btn { padding: 7px 12px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; font-size: 10px; }
    .toggle-btn.active { border-color: var(--accent); color: var(--accent); }

    /* SIGNAL LIST & CHART LAYER */
    .signal-row { padding: 15px; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; cursor: pointer; }
    .signal-row:hover { background: rgba(255,255,255,0.02); }
   
    /* IL CUORE DEL SISTEMA: OVERLAY CHART */
    .chart-wrapper {
        position: relative;
        width: 100%;
        height: 400px;
        background: #0d1117;
        margin-top: 10px;
        border: 1px solid var(--border);
        overflow: hidden;
    }

    /* Livello 1: Prezzi Reali (TradingView/Lightweight) */
    .price-chart-layer {
        position: absolute;
        inset: 0;
        z-index: 1;
    }

    /* Livello 2: Pattern Canvas (Style Autochartist) */
    .pattern-canvas-layer {
        position: absolute;
        inset: 0;
        z-index: 2;
        pointer-events: none; /* Permette di cliccare il grafico sotto */
    }

    .detail-container { display: none; padding: 20px; background: var(--bg2); border: 1px solid var(--accent); margin-top: 10px; }
    .detail-container.open { display: block; }
</style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <h2 style="color:#fff; margin-bottom:10px;">XENOS ENGINE</h2>
        <div class="field">
            <input type="password" id="pwd-input" placeholder="Password Accesso" />
        </div>
        <button class="btn" onclick="doLogin()">GENERATE SIGNALS</button>
    </div>
</div>

<div id="app">
    <div class="wrap">
        <header>
            <div class="logo">XENOS<span>FINANCE</span></div>
            <div id="ts-display">--:--:-- UTC</div>
        </header>

        <div class="controls">
            <div class="group">
                <button class="toggle-btn active" onclick="this.classList.toggle('active')">M15</button>
                <button class="toggle-btn" onclick="this.classList.toggle('active')">H1</button>
            </div>
            <button class="btn" style="width:auto; padding: 10px 25px;" onclick="generateDemoSignal()">REFRESH SCANNER</button>
        </div>

        <div id="signals-list">
            </div>
    </div>
</div>

<script>
let currentPriceChart = null;

function doLogin() {
    const pwd = document.getElementById('pwd-input').value;
    if (pwd === 'xenosfinance2026') {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        setInterval(() => { document.getElementById('ts-display').textContent = new Date().toUTCString().split(' ')[4] + ' UTC'; }, 1000);
    } else { alert("Access Denied"); }
}

// Funzione principale per generare la riga segnale + Grafico sovrapposto
function generateDemoSignal() {
    const list = document.getElementById('signals-list');
    const id = "chart_" + Math.random().toString(36).substr(2, 9);
   
    const row = document.createElement('div');
    row.innerHTML = `
        <div class="signal-row" onclick="toggleDetail('${id}')">
            <div style="color:#fff; font-weight:bold;">EURUSD</div>
            <div style="color:var(--green)">BUY</div>
            <div style="color:var(--accent)">Symmetrical Triangle</div>
            <div>Entry: 1.08450</div>
            <div style="text-align:right">Confidence: 88%</div>
        </div>
        <div id="${id}" class="detail-container">
            <div class="chart-wrapper" id="wrapper_${id}">
                <div id="price_${id}" class="price-chart-layer"></div>
                <canvas id="canvas_${id}" class="pattern-canvas-layer"></canvas>
            </div>
        </div>
    `;
    list.prepend(row);
   
    // Inizializza i due layer dopo un breve timeout per il rendering DOM
    setTimeout(() => initDoubleLayerChart(id, "Symmetrical Triangle", "BUY"), 100);
}

function initDoubleLayerChart(id, patternType, direction) {
    const wrapper = document.getElementById(`wrapper_${id}`);
    const priceContainer = document.getElementById(`price_${id}`);
    const canvas = document.getElementById(`canvas_${id}`);
   
    // 1. Setup Prezzi (Lightweight Charts)
    const chart = LightweightCharts.createChart(priceContainer, {
        layout: { background: { color: 'transparent' }, textColor: '#64748b' },
        grid: { vertLines: { visible: false }, horzLines: { color: '#1e2a38' } },
        width: wrapper.clientWidth,
        height: 400,
    });
    const lineSeries = chart.addLineSeries({ color: '#3b82f6', lineWidth: 1 });
   
    // Dati fittizi per il grafico reale sotto
    lineSeries.setData([
        { time: '2023-04-01', value: 100 }, { time: '2023-04-02', value: 105 },
        { time: '2023-04-03', value: 102 }, { time: '2023-04-04', value: 108 },
        { time: '2023-04-05', value: 104 }, { time: '2023-04-06', value: 110 }
    ]);

    // 2. Setup Canvas Pattern (Overlay)
    canvas.width = wrapper.clientWidth;
    canvas.height = 400;
    drawAutochartistPattern(canvas, patternType, direction);
}

function drawAutochartistPattern(canvas, type, dir) {
    const ctx = canvas.getContext('2d');
    const w = canvas.width;
    const h = canvas.height;
    const isBull = dir === 'BUY';
    const color = isBull ? '#10b981' : '#ef4444';

    ctx.clearRect(0, 0, w, h);
    ctx.setLineDash([5, 5]);
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#f1f5f9';

    // Coordinate relative per centrare il pattern
    const resLine = { x1: w*0.2, y1: h*0.3, x2: w*0.8, y2: h*0.45 };
    const supLine = { x1: w*0.2, y1: h*0.7, x2: w*0.8, y2: h*0.55 };

    // Disegno linee pattern
    ctx.beginPath();
    ctx.moveTo(resLine.x1, resLine.y1); ctx.lineTo(resLine.x2, resLine.y2);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(supLine.x1, supLine.y1); ctx.lineTo(supLine.x2, supLine.y2);
    ctx.stroke();

    // Segnale di Breakout (Freccia)
    ctx.setLineDash([]);
    ctx.fillStyle = color;
    ctx.strokeStyle = color;
   
    const arrowX = resLine.x2 + 10;
    const arrowY = isBull ? resLine.y2 - 40 : supLine.y2 + 40;
   
    drawArrow(ctx, resLine.x2, isBull ? resLine.y2 : supLine.y2, arrowX, arrowY);
}

function drawArrow(ctx, fromx, fromy, tox, toy) {
    const headlen = 10;
    const angle = Math.atan2(toy - fromy, tox - fromx);
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(fromx, fromy);
    ctx.lineTo(tox, toy);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(tox, toy);
    ctx.lineTo(tox - headlen * Math.cos(angle - Math.PI/6), toy - headlen * Math.sin(angle - Math.PI/6));
    ctx.lineTo(tox - headlen * Math.cos(angle + Math.PI/6), toy - headlen * Math.sin(angle + Math.PI/6));
    ctx.fill();
}

function toggleDetail(id) {
    const el = document.getElementById(id);
    el.classList.toggle('open');
}
</script>
</body>
</html>
