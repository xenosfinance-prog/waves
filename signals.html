<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XENOS · Signal Engine</title>
<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

  :root {
  --bg:      #080c10;
  --bg2:     #0d1117;
  --bg3:     #111820;
  --bg4:     #161d27;
  --border:  #1e2a38;
  --border2: #243040;
  --border-bright: #2d4060;
  --gold:    #f59e0b;
  --gold2:   #fbbf24;
  --gold3:   #92400e;
  --accent:  #3b82f6;
  --accent2: #60a5fa;
  --text:    #94a3b8;
  --dim:     #475569;
  --red:     #ef4444;
  --red2:    #f87171;
  --green:   #10b981;
  --green2:  #34d399;
  --blue:    #3b82f6;
  --blue2:   #60a5fa;
  --yellow:  #f59e0b;
  --ink:     #f1f5f9;
  --ink2:    #cbd5e1;
  --muted:   #64748b;
  --bright:  #f1f5f9;
  --text-bright: #f1f5f9;
  --text-dim:    #64748b;
  --sans:    'Inter', sans-serif;
  --mono:    'Space Mono', monospace;
}

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 0 20px; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; letter-spacing: 0.15em; color: var(--text-bright); display: flex; align-items: center; gap: 10px; }
  .logo span { color: var(--accent); }
  .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

  /* AUTH SCREEN */
  #auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .auth-box { border: 1px solid var(--border-bright); background: var(--bg2); padding: 40px; width: 380px; position: relative; }
  .auth-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, #f59e0b, transparent); }
  .field input { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text-bright); padding: 10px; margin-top: 8px; outline: none; }

  /* APP */
  #app { display: none; }
  .controls { display: flex; flex-wrap: wrap; gap: 15px; padding: 20px 0; border-bottom: 1px solid var(--border); align-items: flex-end; }
  .toggle-btn { padding: 7px 12px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-size: 10px; cursor: pointer; }
  .toggle-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(59,130,246,0.06); }
  .btn-generate { padding: 10px 25px; background: var(--accent); color: #000; border: none; font-weight: 700; cursor: pointer; margin-left: auto; }

  /* SIGNAL LIST */
  .signals-header { display: grid; grid-template-columns: 120px 70px 180px 100px 100px 100px 80px 1fr; padding: 12px; font-size: 9px; color: var(--text-dim); border-bottom: 1px solid var(--border); }
  .signal-row { display: grid; grid-template-columns: 120px 70px 180px 100px 100px 100px 80px 1fr; padding: 15px 12px; border-bottom: 1px solid var(--border); cursor: pointer; align-items: center; }
  .sig-dir.BUY { color: var(--green); font-weight: 800; }
  .sig-dir.SELL { color: var(--red); font-weight: 800; }

  /* DETAIL */
  .signal-detail { display: none; background: var(--bg2); padding: 25px; border-bottom: 1px solid var(--border-bright); }
  .signal-detail.open { display: block; }
  .detail-top { display: grid; grid-template-columns: 1fr 400px; gap: 25px; }
  
  .chart-container { background: #000; border: 1px solid var(--border); position: relative; height: 500px; }
  .price-layer { position: absolute; inset: 0; z-index: 1; }
  .pattern-layer { position: absolute; inset: 0; z-index: 2; pointer-events: none; }

  .side-section-title { color: var(--accent); font-size: 10px; font-weight: 800; text-transform: uppercase; border-left: 2px solid var(--accent); padding-left: 10px; margin-bottom: 10px; }
  .detail-text { font-size: 11px; color: #cbd5e1; line-height: 1.6; margin-bottom: 20px; }
  
  .physics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--bg3); border: 1px solid var(--border); padding: 12px; }
  .stat-card span { font-size: 8px; color: var(--text-dim); display: block; }
  .stat-card strong { color: var(--gold); font-size: 14px; }

  .tg-send-btn { width: 100%; background: #0088cc; color: #fff; border: none; padding: 15px; font-weight: 800; cursor: pointer; }
  
  #toast { position: fixed; bottom: 20px; right: 20px; background: var(--green); color: #000; padding: 12px 25px; font-size: 11px; font-weight: 800; display: none; z-index: 999; }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <div class="logo">XENOS<span>FINANCE</span></div>
    <div style="font-size:10px; color:var(--text-dim); margin: 10px 0 25px;">CFD PHYSICS VALIDATION ENGINE</div>
    <div class="field">
      <label style="font-size:9px; text-transform:uppercase;">Access Key</label>
      <input type="password" id="pwd-input" placeholder="••••••••" onkeypress="if(event.key==='Enter') doLogin()">
    </div>
    <button class="btn-generate" style="width:100%; margin-top:20px;" onclick="doLogin()">INITIALIZE SYSTEM</button>
  </div>
</div>

<div id="app">
  <div class="wrap">
    <header>
      <div class="logo"><div class="logo-dot"></div>XENOS<span>FINANCE</span></div>
      <div id="ts-display" style="font-size:11px; color:var(--accent);">--:--:-- UTC</div>
    </header>

    <div class="controls">
      <div class="ctrl-group">
        <span class="ctrl-label">Asset Class</span>
        <div class="toggle-group">
          <button class="toggle-btn active" onclick="selectedClass='ALL'">ALL</button>
          <button class="toggle-btn" onclick="selectedClass='FX'">FX</button>
          <button class="toggle-btn" onclick="selectedClass='CRYPTO'">CRYPTO</button>
        </div>
      </div>
      <button class="btn-generate" onclick="generateSignals()">GENERATE SIGNALS</button>
    </div>

    <div class="signals-header">
      <div>PAIR</div><div>DIR</div><div>PATTERN</div><div>ENTRY</div><div>SL</div><div>TP</div><div>CONF</div><div>R:R</div>
    </div>
    <div id="signals-list"></div>
  </div>
</div>

<div id="toast">SIGNAL BROADCASTED</div>

<script>
let selectedClass = 'ALL';
const PATTERNS = ['Elliott Wave 3', 'Fibonacci Bounce', 'Head & Shoulders', 'Rising Wedge'];

function doLogin() {
  if(document.getElementById('pwd-input').value === 'xenosfinance2026') {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    setInterval(() => { document.getElementById('ts-display').textContent = new Date().toISOString().substr(11,8) + ' UTC'; }, 1000);
  }
}

function generateSignals() {
  const list = document.getElementById('signals-list');
  list.innerHTML = '';
  const pairs = ['EURUSD', 'GBPUSD', 'BTCUSD', 'GOLD', 'NAS100'];
  pairs.forEach(p => createSignalRow(p));
}

function createSignalRow(pair) {
  const id = "sig_" + Math.random().toString(36).substr(2,9);
  const pName = PATTERNS[Math.floor(Math.random()*PATTERNS.length)];
  const dir = (pName === 'Rising Wedge' || pName === 'Head & Shoulders') ? 'SELL' : 'BUY';
  const entry = (100 + Math.random()*50).toFixed(4);

  const row = document.createElement('div');
  row.innerHTML = `
    <div class="signal-row" onclick="toggleDetail('${id}')">
      <div class="sig-pair">${pair}</div>
      <div class="sig-dir ${dir}">${dir}</div>
      <div style="color:var(--accent)">${pName}</div>
      <div>${entry}</div>
      <div style="color:var(--red)">${(entry*0.99).toFixed(4)}</div>
      <div style="color:var(--green)">${(entry*1.02).toFixed(4)}</div>
      <div style="color:var(--gold)">88%</div>
      <div style="color:var(--accent2)">1:2.5</div>
    </div>
    <div id="${id}" class="signal-detail">
      <div class="detail-top">
        <div class="chart-container" id="cont_${id}">
          <div id="price_${id}" class="price-layer"></div>
          <canvas id="canvas_${id}" class="pattern-layer"></canvas>
        </div>
        <div class="detail-info">
          <div class="side-section-title">Elliott Wave Context</div>
          <p class="detail-text">Internal wave recognition suggests a completion of sub-cycle. Physics validation confirms laminar flow in order book.</p>
          <div class="side-section-title">CFD Physics Validation</div>
          <div class="physics-grid">
            <div class="stat-card"><span>REYNOLDS NUMBER</span><strong>0.2831</strong></div>
            <div class="stat-card"><span>VISCOSITY</span><strong>0.0124</strong></div>
          </div>
          <button class="tg-send-btn" onclick="sendTelegram('${pair}','${dir}','${pName}','${entry}')">SEND TO TELEGRAM</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('signals-list').appendChild(row);
  setTimeout(() => initXenosChart(id, pName, dir), 100);
}

function initXenosChart(id, pName, dir) {
  const cont = document.getElementById(`cont_${id}`);
  const w = cont.clientWidth; const h = 500;
  
  const chart = LightweightCharts.createChart(document.getElementById(`price_${id}`), {
    layout: { background: { color: 'transparent' }, textColor: '#64748b' },
    grid: { vertLines: { visible: false }, horzLines: { color: '#1e2a38' } },
    width: w, height: h
  });
  const s = chart.addCandlestickSeries({ upColor: '#10b981', downColor: '#ef4444', borderVisible: false });
  let d = []; let v = 150;
  for(let i=0; i<80; i++) { v += (Math.random()-0.5); d.push({time: i, open:v, high:v+0.5, low:v-0.5, close:v+0.2}); }
  s.setData(d);

  const canvas = document.getElementById(`canvas_${id}`);
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  const color = dir === 'BUY' ? '#10b981' : '#ef4444';
  
  ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2;
  
  // OTTIMIZZAZIONE 1: FIBONACCI BOUNCE LOGIC
  if(pName === 'Fibonacci Bounce') {
    [0.382, 0.5, 0.618].forEach(lvl => {
      ctx.setLineDash([5, 5]); ctx.strokeStyle = "rgba(255,255,255,0.15)";
      ctx.beginPath(); ctx.moveTo(0, h * lvl); ctx.lineTo(w, h * lvl); ctx.stroke();
      ctx.fillStyle = "#fff"; ctx.font = "9px Space Mono"; ctx.fillText(`FIB ${lvl}`, 10, h * lvl - 5);
    });
    ctx.setLineDash([]); ctx.strokeStyle = color;
    ctx.beginPath(); ctx.moveTo(w*0.1, h*0.2); ctx.lineTo(w*0.4, h*0.618); ctx.lineTo(w*0.7, h*0.3); ctx.stroke();
  } else if (pName === 'Head & Shoulders') {
    ctx.beginPath(); ctx.moveTo(w*0.1, h*0.6); ctx.lineTo(w*0.25, h*0.4); ctx.lineTo(w*0.4, h*0.6); ctx.lineTo(w*0.5, h*0.2); ctx.lineTo(w*0.6, h*0.6); ctx.lineTo(w*0.75, h*0.4); ctx.lineTo(w*0.9, h*0.6); ctx.stroke();
  }

  // OTTIMIZZAZIONE 2: FRECCIA SEMPRE UP + COLORE DINAMICO
  const startX = w*0.82; const startY = h*0.45;
  ctx.setLineDash([]); ctx.strokeStyle = color; ctx.fillStyle = color;
  ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(startX+30, startY-50); ctx.stroke();
  // Punta della freccia
  ctx.beginPath();
  ctx.moveTo(startX+30, startY-50);
  ctx.lineTo(startX+20, startY-45);
  ctx.lineTo(startX+25, startY-35);
  ctx.fill();
}

function sendTelegram(pair, dir, pattern, entry) {
  // OTTIMIZZAZIONE 3: PAYLOAD COMPLETO (Elliott + Physics)
  const msg = ` XENOS BROADCAST\n\nAsset: ${pair}\nDirection: ${dir}\nPattern: ${pattern}\nEntry: ${entry}\n\n Elliott: Cycle Confirmed\n Physics: Reynolds 0.2831\n\n[SNAPSHOT LOADED]`;
  console.log("Sending to TG:", msg);
  const t = document.getElementById('toast');
  t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000);
}

function toggleDetail(id) { document.getElementById(id).classList.toggle('open'); }
</script>
</body>
</html>
