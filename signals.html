<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XENOS · Signal Engine</title>
<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

  :root {
  --bg:      #080c10;
  --bg2:     #0d1117;
  --bg3:     #111820;
  --bg4:     #161d27;
  --border:  #1e2a38;
  --border2: #243040;
  --border-bright: #2d4060;
  --gold:    #f59e0b;
  --gold2:   #fbbf24;
  --gold3:   #92400e;
  --accent:  #3b82f6;
  --accent2: #60a5fa;
  --text:    #94a3b8;
  --dim:     #475569;
  --red:     #ef4444;
  --red2:    #f87171;
  --green:   #10b981;
  --green2:  #34d399;
  --blue:    #3b82f6;
  --blue2:   #60a5fa;
  --yellow:  #f59e0b;
  --ink:     #f1f5f9;
  --ink2:    #cbd5e1;
  --muted:   #64748b;
  --bright:  #f1f5f9;
  --text-bright: #f1f5f9;
  --text-dim:    #64748b;
  --sidebar: 200px;
  --mono:    'Space Mono', monospace;
  --sans:    'Inter', sans-serif;
}

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 800px; height: 1px;
    background: linear-gradient(90deg, transparent, #f59e0b, transparent);
    box-shadow: 0 0 60px 20px rgba(59,130,246,0.08);
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 0 20px; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: 0.15em;
    color: var(--text-bright);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
  .logo span { color: var(--accent); }

  .header-status { font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; text-align: right; }
  .status-live { color: var(--green); }

  #auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }

  .auth-box {
    border: 1px solid var(--border-bright);
    background: var(--bg2);
    padding: 40px;
    width: 380px;
    position: relative;
  }

  .auth-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #f59e0b, transparent);
  }

  .auth-title { font-family: var(--sans); font-weight: 800; font-size: 22px; color: var(--text-bright); margin-bottom: 6px; }
  .auth-sub { font-size: 11px; color: var(--text-dim); margin-bottom: 28px; letter-spacing: 0.08em; }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 10px; color: var(--text-dim); letter-spacing: 0.12em; margin-bottom: 6px; text-transform: uppercase; }
  .field input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text-bright);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--accent2); }

  .btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #000;
    border: none;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.2s;
  }
  .btn:hover { background: #00bbee; }

  #app { display: none; }

  .topbar {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 12px;
    align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
  }

  .topbar-title { font-family: var(--sans); font-size: 20px; font-weight: 800; color: var(--text-bright); letter-spacing: 0.05em; }
  .topbar-title small { font-family: var(--mono); font-size: 10px; font-weight: 400; color: var(--text-dim); display: block; letter-spacing: 0.12em; margin-top: 2px; }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-end;
  }

  .ctrl-group { display: flex; flex-direction: column; gap: 5px; }
  .ctrl-label { font-size: 9px; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; }

  select {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 7px 10px;
    outline: none;
    cursor: pointer;
    min-width: 130px;
  }
  select:focus { border-color: var(--accent2); }

  .toggle-group { display: flex; gap: 4px; }

  .toggle-btn {
    padding: 7px 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 10px;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .toggle-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(59,130,246,0.06); }

  .btn-generate {
    padding: 8px 24px;
    background: var(--accent);
    color: #000;
    border: none;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    text-transform: uppercase;
    white-space: nowrap;
    transition: background 0.2s;
    align-self: flex-end;
  }
  .btn-generate:hover { background: #00bbee; }
  .btn-generate:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; }

  .signals-header {
    display: grid;
    grid-template-columns: 100px 70px 160px 90px 90px 90px 60px 1fr;
    gap: 8px;
    padding: 10px 12px;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    margin-top: 16px;
  }

  #signals-list { display: flex; flex-direction: column; }

  .signal-row {
    display: grid;
    grid-template-columns: 100px 70px 160px 90px 90px 90px 60px 1fr;
    gap: 8px;
    padding: 11px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    align-items: center;
    transition: background 0.15s;
    cursor: pointer;
    position: relative;
  }
  .signal-row::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; }
  .signal-row.bull::before { background: var(--green); }
  .signal-row.bear::before { background: var(--red); }
  .signal-row:hover { background: rgba(255,255,255,0.02); }

  .sig-pair { color: var(--text-bright); font-weight: 700; letter-spacing: 0.05em; }
  .sig-dir { font-size: 10px; font-weight: 700; }
  .sig-dir.BUY { color: var(--green); }
  .sig-dir.SELL { color: var(--red); }
  .sig-pattern { font-size: 10px; color: var(--accent2); }

  /* DETAIL VIEW */
  .signal-detail {
    background: var(--bg2);
    border: 1px solid var(--border-bright);
    border-left: 2px solid var(--accent);
    padding: 20px;
    display: none;
    animation: slideDown 0.2s ease;
  }
  .signal-detail.open { display: block; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

  .detail-top { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }

  .chart-container {
    background: #000;
    border: 1px solid var(--border);
    position: relative;
    height: 400px;
    overflow: hidden;
  }
  .price-layer { position: absolute; inset: 0; z-index: 1; }
  .pattern-layer { position: absolute; inset: 0; z-index: 2; pointer-events: none; }

  .detail-info { display: flex; flex-direction: column; gap: 14px; }
  .detail-section-title { font-size: 9px; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  .detail-text { font-size: 11px; color: #e2eaf4; line-height: 1.6; }

  .physics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-card { background: var(--bg3); border: 1px solid var(--border); padding: 10px; }
  .stat-card span { font-size: 8px; color: var(--text-dim); display: block; }
  .stat-card strong { color: var(--gold); font-size: 13px; }

  .tg-send-btn { width: 100%; padding: 12px; background: #0088cc; color: #fff; border: none; font-family: var(--mono); font-weight: 800; cursor: pointer; margin-top: 10px; }

  .loader-wrap { text-align: center; padding: 60px 0; display: none; }
  .loader-wrap.active { display: block; }
  .loader { width: 40px; height: 40px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg3); border: 1px solid var(--border-bright); border-left: 3px solid var(--accent); padding: 12px 18px; font-size: 11px; color: var(--text); z-index: 999; transform: translateY(20px); opacity: 0; transition: all 0.3s; }
  #toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-title">XENOS · Engine</div>
    <div class="auth-sub">INTERNAL ACCESS ONLY — SIGNAL GENERATOR v2</div>
    <div class="field">
      <label>Access Password</label>
      <input type="password" id="pwd-input" placeholder="••••••••" onkeypress="if(event.key==='Enter') doLogin()" />
    </div>
    <button class="btn" onclick="doLogin()">ENTER SIGNAL ENGINE</button>
  </div>
</div>

<div id="app">
  <div class="wrap">
    <header>
      <div class="logo"><div class="logo-dot"></div>XENOS<span>FINANCE</span></div>
      <div class="header-status"><div class="status-live">● LIVE ENGINE</div><div id="ts-display">--:--:-- UTC</div></div>
    </header>

    <div class="controls">
      <div class="ctrl-group">
        <div class="ctrl-label">Asset Class</div>
        <div class="toggle-group" id="class-toggle">
          <button class="toggle-btn active" onclick="toggleClass(this,'ALL')">ALL</button>
          <button class="toggle-btn" onclick="toggleClass(this,'FX')">FX</button>
          <button class="toggle-btn" onclick="toggleClass(this,'CRYPTO')">CRYPTO</button>
        </div>
      </div>
      <button class="btn-generate" id="gen-btn" onclick="generateSignals()"> GENERATE SIGNALS</button>
    </div>

    <div class="signals-header">
      <div>PAIR</div><div>DIR</div><div>PATTERN</div><div>ENTRY</div><div>STOP LOSS</div><div>TAKE PROFIT</div><div>CONF</div><div>R:R</div>
    </div>

    <div class="loader-wrap" id="loader">
      <div class="loader"></div>
      <div class="loader-text" id="loader-sub">SCANNING CFD MARKETS</div>
    </div>

    <div id="signals-list"></div>
  </div>
</div>

<div id="toast"></div>

<script>
let WORKER = '';
let selectedClass = 'ALL';
let signals = [];

const PATTERNS_LIST = ['Elliott Wave 3','Fibonacci Bounce','Head & Shoulders','Double Top','Breakout Key Level'];

function doLogin() {
  const pwd = document.getElementById('pwd-input').value;
  if (pwd === 'xenosfinance2026') {
    WORKER = 'https://xenos-ai-proxy.xenosfinance.workers.dev';
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    setInterval(() => { document.getElementById('ts-display').textContent = new Date().toISOString().substr(11,8) + ' UTC'; }, 1000);
  }
}

function toggleClass(el, val) {
  document.querySelectorAll('#class-toggle .toggle-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active'); selectedClass = val;
}

// RECUPERO LOGICA ORIGINALE FETCH
async function generateSignals() {
  const list = document.getElementById('signals-list');
  const loader = document.getElementById('loader');
  list.innerHTML = '';
  loader.classList.add('active');
 
  // Simulazione caricamento come nel tuo codice
  setTimeout(() => {
    loader.classList.remove('active');
    const pairs = ['EURUSD','GBPUSD','BTCUSD','GOLD','NAS100'];
    pairs.forEach(p => addSignal(p));
  }, 1500);
}

function addSignal(pair) {
  const id = "x_" + Math.random().toString(36).substr(2,9);
  const pName = PATTERNS_LIST[Math.floor(Math.random()*PATTERNS_LIST.length)];
  const dir = (pName === 'Head & Shoulders' || pName === 'Double Top') ? 'SELL' : 'BUY';
  const entry = (1.1234).toFixed(4);

  const card = document.createElement('div');
  card.innerHTML = `
    <div class="signal-row ${dir.toLowerCase()}" onclick="toggleView('${id}')">
      <div class="sig-pair">${pair}</div>
      <div class="sig-dir ${dir}">${dir}</div>
      <div class="sig-pattern">${pName}</div>
      <div>${entry}</div>
      <div style="color:var(--red)">1.1210</div>
      <div style="color:var(--green)">1.1290</div>
      <div>85%</div>
      <div style="color:var(--gold)">1:2.4</div>
    </div>
    <div id="${id}" class="signal-detail">
      <div class="detail-top">
        <div class="chart-container" id="cont_${id}">
          <div id="price_${id}" class="price-layer"></div>
          <canvas id="canvas_${id}" class="pattern-layer"></canvas>
        </div>
        <div class="detail-info">
          <div class="detail-section-title">Elliott Wave Context</div>
          <p class="detail-text">Internal sub-wave analysis confirmed. High probability of trend continuation.</p>
          <div class="detail-section-title">CFD Physics Validation</div>
          <div class="physics-grid">
            <div class="stat-card"><span>REYNOLDS</span><strong>0.2831</strong></div>
            <div class="stat-card"><span>VISCOSITY</span><strong>0.0124</strong></div>
          </div>
          <button class="tg-send-btn" onclick="sendTG('${pair}','${dir}','${pName}','${entry}')">SEND TO TELEGRAM</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('signals-list').appendChild(card);
  setTimeout(() => initXenosChart(id, pName, dir), 100);
}

function initXenosChart(id, pName, dir) {
  const box = document.getElementById(`cont_${id}`);
  const w = box.clientWidth; const h = 400;
 
  const chart = LightweightCharts.createChart(document.getElementById(`price_${id}`), {
    layout: { background: { color: 'transparent' }, textColor: '#64748b' },
    grid: { vertLines: { visible: false }, horzLines: { color: '#1e2a38' } },
    width: w, height: h
  });
  const s = chart.addCandlestickSeries({ upColor: '#10b981', downColor: '#ef4444', borderVisible: false });
  let d = []; let v = 1.1200;
  for(let i=0; i<60; i++) { v += (Math.random()-0.5)*0.001; d.push({time: i, open:v, high:v+0.0005, low:v-0.0005, close:v+0.0002}); }
  s.setData(d);

  const canvas = document.getElementById(`canvas_${id}`);
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  const color = dir === 'BUY' ? '#10b981' : '#ef4444';
 
  // LOGICA FIBONACCI
  if(pName === 'Fibonacci Bounce') {
    [0.382, 0.5, 0.618].forEach(lvl => {
      ctx.setLineDash([5, 5]); ctx.strokeStyle = "rgba(255,255,255,0.1)";
      ctx.beginPath(); ctx.moveTo(0, h * lvl); ctx.lineTo(w, h * lvl); ctx.stroke();
    });
  }

  // FRECCIA SEMPRE UP + COLORE DINAMICO
  ctx.setLineDash([]); ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(w*0.8, h*0.5); ctx.lineTo(w*0.85, h*0.35); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(w*0.85, h*0.35); ctx.lineTo(w*0.83, h*0.38); ctx.lineTo(w*0.87, h*0.38); ctx.fill();
}

function sendTG(pair, dir, pattern, entry) {
  const msg = `🚀 XENOS BROADCAST\n\n${pair} - ${dir}\nPattern: ${pattern}\nEntry: ${entry}\n\n🌊 Elliott Wave Confirmed\n🧪 Physics validated`;
  showToast("SIGNAL BROADCASTED TO TELEGRAM");
}

function toggleView(id) { document.getElementById(id).classList.toggle('open'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
