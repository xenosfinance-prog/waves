<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XENOS · Signal Engine OMNI-V3</title>
<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;700;800&display=swap');

    :root {
        --bg: #080c10; --bg2: #0d1117; --bg3: #111820; --border: #1e2a38;
        --gold: #f59e0b; --accent: #3b82f6; --text: #94a3b8;
        --red: #ef4444; --green: #10b981; --text-bright: #f1f5f9;
        --mono: 'Space Mono', monospace; --sans: 'Inter', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; overflow-x: hidden; }

    .wrap { max-width: 1400px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }
    header { border-bottom: 1px solid var(--border); padding: 16px 0; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-family: var(--sans); font-weight: 800; font-size: 18px; color: var(--text-bright); }
    .logo span { color: var(--accent); }

    /* AUTH */
    #auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #111827 0%, #080c10 100%); }
    .auth-box { border: 1px solid var(--accent); background: var(--bg2); padding: 40px; width: 380px; box-shadow: 0 0 40px rgba(59,130,246,0.1); }
    .field input { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: #fff; padding: 12px; margin: 15px 0; outline: none; }
   
    /* APP LAYOUT */
    #app { display: none; padding-bottom: 60px; }
    .controls { display: flex; gap: 15px; padding: 25px 0; border-bottom: 1px solid var(--border); align-items: flex-end; flex-wrap: wrap; }
    .btn { padding: 12px 24px; background: var(--accent); color: #000; border: none; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 11px; }
    .btn-tg { background: #0088cc; color: white; margin-top: 15px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
   
    .toggle-btn { padding: 8px 16px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; font-size: 10px; }
    .toggle-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(59,130,246,0.1); }

    /* SIGNAL ROW */
    .signal-card { background: var(--bg2); border: 1px solid var(--border); margin-top: 12px; }
    .signal-header { display: grid; grid-template-columns: 1fr 1fr 1.5fr 1fr 1fr 1fr; padding: 18px; cursor: pointer; align-items: center; }
    .sig-buy { color: var(--green); font-weight: bold; }
    .sig-sell { color: var(--red); font-weight: bold; }

    /* DETAILS & ENGINE */
    .detail-view { display: none; padding: 20px; background: #090d12; border-top: 1px solid var(--border); }
    .detail-view.open { display: block; }
   
    .main-grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
    .chart-container { position: relative; width: 100%; height: 500px; background: #0d1117; border: 1px solid var(--border); }
    .price-layer { position: absolute; inset: 0; z-index: 1; }
    .pattern-layer { position: absolute; inset: 0; z-index: 2; pointer-events: none; }

    .sidebar-info { background: var(--bg3); padding: 20px; border: 1px solid var(--border); font-size: 11px; line-height: 1.6; }
    .physics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; border-top: 1px dashed var(--border); padding-top: 15px; }
   
    .badge { padding: 2px 6px; border-radius: 3px; font-size: 10px; background: rgba(255,255,255,0.05); }
    #toast { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: #000; padding: 12px 25px; font-weight: 700; z-index: 1000; display: none; }
</style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <h2 style="color:#fff; margin-bottom:10px; font-family: var(--sans);">XENOS ENGINE</h2>
        <p style="font-size: 10px; color: var(--accent);">STRICTLY FOR INTERNAL USE ONLY</p>
        <div class="field">
            <input type="password" id="pwd-input" placeholder="ENTER ACCESS KEY" onkeypress="if(event.key==='Enter') doLogin()" />
        </div>
        <button class="btn" style="width:100%" onclick="doLogin()">START SESSION</button>
    </div>
</div>

<div id="app">
    <div class="wrap">
        <header>
            <div class="logo">XENOS<span>SIGNAL</span></div>
            <div id="ts-display" style="color: var(--accent); font-size: 12px;">--:--:-- UTC</div>
        </header>

        <div class="controls">
            <div class="group">
                <span style="font-size: 9px; display: block; margin-bottom: 5px;">TIMEFRAME</span>
                <button class="toggle-btn active" onclick="setTF(this, 'M15')">M15</button>
                <button class="toggle-btn" onclick="setTF(this, 'H1')">H1</button>
            </div>
            <div class="group">
                <span style="font-size: 9px; display: block; margin-bottom: 5px;">ASSET CLASS</span>
                <button class="toggle-btn active" onclick="setClass(this, 'FX')">FOREX</button>
                <button class="toggle-btn" onclick="setClass(this, 'CRYPTO')">CRYPTO</button>
            </div>
            <button class="btn" style="margin-left: auto;" onclick="scanMarket()">SCAN MARKET</button>
        </div>

        <div id="signals-list"></div>
    </div>
</div>

<div id="toast">Signal Sent to Telegram!</div>

<script>
// --- CONFIGURAZIONE INTEGRALE ---
const TG_BOT_TOKEN = 'IL_TUO_BOT_TOKEN'; // Inserire qui
const TG_CHAT_ID = 'IL_TUO_CHAT_ID';   // Inserire qui
let selectedTF = 'M15';
let selectedClass = 'FX';

const PATTERNS = {
    'Head & Shoulders': { type: 'Reversal', bias: 'SELL' },
    'Double Top': { type: 'Reversal', bias: 'SELL' },
    'Double Bottom': { type: 'Reversal', bias: 'BUY' },
    'Symmetrical Triangle': { type: 'Continuation', bias: 'BUY' },
    'Falling Wedge': { type: 'Bullish Reversal', bias: 'BUY' }
};

function doLogin() {
    if (document.getElementById('pwd-input').value === 'xenosfinance2026') {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        setInterval(() => { document.getElementById('ts-display').textContent = new Date().toISOString().substr(11, 8) + ' UTC'; }, 1000);
    } else { alert("ACCESS DENIED"); }
}

function setTF(btn, tf) {
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); selectedTF = tf;
}

function scanMarket() {
    const pairs = selectedClass === 'FX' ? ['EURUSD', 'GBPUSD', 'CHFJPY'] : ['BTCUSD', 'ETHUSD'];
    const list = document.getElementById('signals-list');
    list.innerHTML = '';
   
    pairs.forEach(pair => {
        const pKeys = Object.keys(PATTERNS);
        const pName = pKeys[Math.floor(Math.random() * pKeys.length)];
        createSignal(pair, pName);
    });
}

function createSignal(pair, pName) {
    const id = "sig_" + Math.random().toString(36).substr(2, 9);
    const patternData = PATTERNS[pName];
    const entry = (1.0820 + Math.random() * 0.05).toFixed(4);
   
    const card = document.createElement('div');
    card.className = 'signal-card';
    card.innerHTML = `
        <div class="signal-header" onclick="toggleDetail('${id}')">
            <div style="color:#fff; font-weight:800;">${pair} <span class="badge">${selectedTF}</span></div>
            <div class="${patternData.bias === 'BUY' ? 'sig-buy' : 'sig-sell'}">${patternData.bias}</div>
            <div style="color:var(--accent);">${pName}</div>
            <div>E: ${entry}</div>
            <div style="color:var(--gold)">88%</div>
            <div style="text-align:right">1:2.5</div>
        </div>
        <div id="${id}" class="detail-view">
            <div class="main-grid">
                <div class="chart-container" id="cont_${id}">
                    <div id="price_${id}" class="price-layer"></div>
                    <canvas id="canvas_${id}" class="pattern-layer"></canvas>
                </div>
                <div class="sidebar-info">
                    <h3 style="color:#fff; margin-bottom:10px;">PATTERN ANALYSIS</h3>
                    <p>${pName} detected with high volume confirmation. Market structure shows clear ${patternData.type} characteristics.</p>
                   
                    <div class="physics-grid">
                        <div><span style="color:var(--accent)">REYNOLDS (Thrust)</span><br><strong>0.2834</strong></div>
                        <div><span style="color:var(--accent)">VISCOSITY</span><br><strong>0.0122</strong></div>
                    </div>

                    <div style="margin-top:20px;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>STOP LOSS</span><span style="color:var(--red)">${(entry*0.995).toFixed(4)}</span></div>
                        <div style="display:flex; justify-content:space-between;"><span>TAKE PROFIT</span><span style="color:var(--green)">${(entry*1.015).toFixed(4)}</span></div>
                    </div>

                    <button class="btn btn-tg" onclick="sendToTelegram('${pair}', '${patternData.bias}', '${pName}', '${entry}')">
                        SEND TO TELEGRAM
                    </button>
                </div>
            </div>
        </div>
    `;
    document.getElementById('signals-list').prepend(card);
    setTimeout(() => initEngine(id, pName, patternData.bias), 100);
}

function initEngine(id, pName, bias) {
    const container = document.getElementById(`cont_${id}`);
    const w = container.clientWidth;
    const h = 500;

    // Chart Prezzi
    const chart = LightweightCharts.createChart(document.getElementById(`price_${id}`), {
        layout: { background: { color: 'transparent' }, textColor: '#64748b' },
        grid: { vertLines: { visible: false }, horzLines: { color: '#1e2a38' } },
        width: w, height: h
    });
    const s = chart.addCandlestickSeries({ upColor: '#10b981', downColor: '#ef4444' });
    let d = []; let v = 100;
    for(let i=0; i<80; i++) { v += (Math.random()-0.5); d.push({time: i, open:v, high:v+0.2, low:v-0.2, close:v+0.1}); }
    s.setData(d);

    // Canvas Pattern
    const canvas = document.getElementById(`canvas_${id}`);
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    drawPatternGeometry(ctx, w, h, pName, bias);
}

function drawPatternGeometry(ctx, w, h, name, bias) {
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 2.5; ctx.lineJoin = "round";
    const pad = 80;
    const color = bias === 'BUY' ? '#10b981' : '#ef4444';

    if(name === 'Head & Shoulders') {
        const neck = h-150;
        const pts = [{x:w*0.2, y:neck}, {x:w*0.35, y:pad+60}, {x:w*0.45, y:neck+10}, {x:w*0.55, y:pad}, {x:w*0.65, y:neck+10}, {x:w*0.75, y:pad+60}, {x:w*0.85, y:neck}];
        ctx.beginPath(); pts.forEach((p,i) => i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y)); ctx.stroke();
        // Labels
        ctx.fillStyle = "#fff"; ctx.fillText("LS", pts[1].x-5, pts[1].y-10); ctx.fillText("HEAD", pts[3].x-10, pts[3].y-10); ctx.fillText("RS", pts[5].x-5, pts[5].y-10);
        // Neckline
        ctx.setLineDash([5,5]); ctx.strokeStyle = "#3b82f6"; ctx.beginPath(); ctx.moveTo(pts[2].x-40, pts[2].y); ctx.lineTo(pts[4].x+120, pts[4].y); ctx.stroke();
        drawArrow(ctx, pts[6].x, pts[6].y, pts[6].x, pts[6].y+80, color);
    }
    else if(name.includes('Triangle')) {
        ctx.beginPath(); ctx.moveTo(w*0.2, pad); ctx.lineTo(w*0.8, h/2); ctx.lineTo(w*0.2, h-pad); ctx.stroke();
        drawArrow(ctx, w*0.8, h/2, w*0.8+40, h/2-60, color);
    }
    else {
        // Default Channel/Wedge logic
        ctx.setLineDash([5,5]);
        ctx.beginPath(); ctx.moveTo(w*0.2, pad); ctx.lineTo(w*0.8, pad+100); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(w*0.2, pad+150); ctx.lineTo(w*0.8, pad+250); ctx.stroke();
        drawArrow(ctx, w*0.8, pad+100, w*0.8+30, bias==='BUY'?pad+40:pad+160, color);
    }
}

function drawArrow(ctx, x1, y1, x2, y2, color) {
    const head = 12; const angle = Math.atan2(y2-y1, x2-x1);
    ctx.setLineDash([]); ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x2,y2);
    ctx.lineTo(x2-head*Math.cos(angle-Math.PI/6), y2-head*Math.sin(angle-Math.PI/6));
    ctx.lineTo(x2-head*Math.cos(angle+Math.PI/6), y2-head*Math.sin(angle+Math.PI/6));
    ctx.fill();
}

async function sendToTelegram(pair, dir, pattern, entry) {
    const msg = `🚀 *XENOS SIGNAL DETECTED*\n\n` +
                `Instrument: *${pair}*\n` +
                `Direction: *${dir}*\n` +
                `Pattern: *${pattern}*\n` +
                `Timeframe: *${selectedTF}*\n` +
                `Entry: ${entry}\n\n` +
                `_Engine: Xenos Signal PRO v3_`;

    try {
        await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: TG_CHAT_ID, text: msg, parse_mode: 'Markdown' })
        });
        const t = document.getElementById('toast');
        t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000);
    } catch(e) { alert("Check Telegram Config"); }
}

function toggleDetail(id) {
    document.getElementById(id).classList.toggle('open');
}
</script>
</body>
</html>
